services:
  - type: web
    name: bahuraksha-api
    env: python
    plan: free

    buildCommand: |
      pip install --upgrade pip
      pip install -r bahuraksha-api/requirements.txt

    startCommand: |
      uvicorn bahuraksha-api.main:app --host 0.0.0.0 --port 10000

    envVars:
      - key: PYTHON_VERSION
        value: 3.11